<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe App</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

<div class="auth-wrap">
  <div class="auth-logo">🍽 recipely</div>
  <p class="auth-tagline">your AI-powered recipe companion</p>

  <div class="auth-tabs">
    <button class="tab active" onclick="switchTab('login')">login</button>
    <button class="tab" onclick="switchTab('register')">register</button>
  </div>

  <!-- Login Form -->
  <div id="login-form" class="auth-form">
    <input type="email" id="login-email" placeholder="email" />
    <input type="password" id="login-password" placeholder="password" />
    <button class="btn-primary" onclick="login()">login</button>
    <div class="auth-error" id="login-error"></div>
  </div>

  <!-- Register Form -->
  <div id="register-form" class="auth-form" style="display:none;">
    <input type="text" id="reg-name" placeholder="your name" />
    <input type="email" id="reg-email" placeholder="email" />
    <input type="password" id="reg-password" placeholder="password" />
    <button class="btn-primary" onclick="register()">create account</button>
    <div class="auth-error" id="register-error"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:3001/api';

  // If already logged in, go to dashboard
  if (localStorage.getItem('token')) window.location.href = 'pages/dashboard.html';

  function switchTab(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
  }

  async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    err.textContent = '';
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { err.textContent = data.error; return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'pages/dashboard.html';
    } catch { err.textContent = 'Connection failed. Is the server running?'; }
  }

  async function register() {
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    const err = document.getElementById('register-error');
    err.textContent = '';
    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password }),
      });
      const data = await res.json();
      if (!res.ok) { err.textContent = data.error; return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'pages/dashboard.html';
    } catch { err.textContent = 'Connection failed. Is the server running?'; }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const activeForm = document.getElementById('login-form').style.display !== 'none' ? 'login' : 'register';
      activeForm === 'login' ? login() : register();
    }
  });
</script>
</body>
</html>
